<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tableau de Bord - Récapitulatif F&B</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1, h2 { color: #2c3e50; }
        input[type="file"] { margin: 20px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; margin-bottom: 30px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #34495e; color: white; text-align: center; }
        td:first-child { text-align: left; font-weight: bold; }
        .btn-export { background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; width: 100%; transition: background 0.3s; }
        .btn-export:hover { background-color: #219150; }
        .positive { color: #27ae60; font-weight: bold; }
        .negative { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>Tableau de Bord Journalier</h1>
    <p>Importez le fichier du jour pour générer les rapports DG et Groupe.</p>
    
    <input type="file" id="excelUpload" accept=".xlsx, .xls, .xlsm" />

    <div id="dashboard" style="display:none;">
        <button class="btn-export" onclick="exportToExcel()">📥 Télécharger le Fichier Excel (Format DG & Groupe)</button>

        <h2>Récap DG (Détail par Site)</h2>
        <table id="recapDgTable">
            <thead>
                <tr>
                    <th>Site</th>
                    <th>CA Journalier 2026</th>
                    <th>Cumul Mensuel 2026</th>
                    <th>Var. / Date Exacte (%)</th>
                    <th>Var. / Jour Équiv. (%)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>

        <h2>Récap Groupe (Consolidation)</h2>
        <table id="recapGroupeTable">
            <thead>
                <tr>
                    <th>Indicateur Groupe</th>
                    <th>Résultat Global</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>

<script>
    // Variables globales pour stocker les données pures pour l'export Excel
    let exportDataDg = [];
    let exportDataGroupe = [];
    let dateDuJourStr = "";

    // Formateur de devise et pourcentage
    const formatMoney = (val) => val.toLocaleString('fr-MA', {style:'currency', currency:'MAD'});
    const formatPct = (val) => {
        const pct = (val * 100).toFixed(2) + ' %';
        return val >= 0 ? `<span class="positive">+${pct}</span>` : `<span class="negative">${pct}</span>`;
    };

    document.getElementById('excelUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Générer la date d'aujourd'hui en format texte (ex: Jeudi 2 Juillet 2026)
        const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        dateDuJourStr = "Journée du : " + new Date().toLocaleDateString('fr-FR', dateOptions).replace(/^\w/, (c) => c.toUpperCase());

        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, {type: 'array'});

            const sites = [
                'Rabat Aswak Assalam', 'Rabat Arribat Centre', 'Rabat Mega Mall', 
                'Kenitra Aswak Assalam', 'Mohammedia Aswak Assalam', 'Casa Port'
            ];

            let htmlDg = '';
            
            // Totaux pour recalculer les pourcentages globaux
            let totCA2026 = 0;
            let totCumul2026 = 0;
            let totCA2025DateEx = 0;
            let totCA2025JourEq = 0;

            exportDataDg = []; // Réinitialiser les données

            sites.forEach(site => {
                const worksheet = workbook.Sheets[site];
                if (worksheet) {
                    const json = XLSX.utils.sheet_to_json(worksheet, {header: 1, range: 5});
                    
                    let lastRow = null;
                    for (let i = json.length - 1; i >= 0; i--) {
                        if (json[i][2]) { // S'il y a du CA Journalier
                            lastRow = json[i];
                            break;
                        }
                    }

                    if (lastRow) {
                        const caJour = parseFloat(lastRow[2]) || 0;
                        const caCumul = parseFloat(lastRow[3]) || 0;
                        
                        // Valeurs de base 2025 pour le calcul Groupe
                        const ca25DateEx = parseFloat(lastRow[6]) || 0;
                        const ca25JourEq = parseFloat(lastRow[10]) || 0;

                        // Pourcentages directs pour le site (Index 13 et 15)
                        const pctDate = parseFloat(lastRow[13]) || 0; 
                        const pctJour = parseFloat(lastRow[15]) || 0; 

                        // Ajout aux totaux globaux
                        totCA2026 += caJour;
                        totCumul2026 += caCumul;
                        totCA2025DateEx += ca25DateEx;
                        totCA2025JourEq += ca25JourEq;

                        // Création ligne HTML
                        htmlDg += `<tr>
                                    <td>${site}</td>
                                    <td>${formatMoney(caJour)}</td>
                                    <td>${formatMoney(caCumul)}</td>
                                    <td>${formatPct(pctDate)}</td>
                                    <td>${formatPct(pctJour)}</td>
                                   </tr>`;

                        // Ajout à la matrice d'export Excel brute
                        exportDataDg.push([site, caJour, caCumul, pctDate, pctJour]);
                    }
                }
            });

            // Calcul des VRAIS pourcentages globaux du Groupe
            const globalPctDate = totCA2025DateEx !== 0 ? (totCA2026 - totCA2025DateEx) / totCA2025DateEx : 0;
            const globalPctJour = totCA2025JourEq !== 0 ? (totCA2026 - totCA2025JourEq) / totCA2025JourEq : 0;

            document.querySelector('#recapDgTable tbody').innerHTML = htmlDg;

            let htmlGroupe = `
                <tr><td>CA Journalier Global</td><td>${formatMoney(totCA2026)}</td></tr>
                <tr><td>Cumul Mensuel Global</td><td>${formatMoney(totCumul2026)}</td></tr>
                <tr><td>Évolution Globale / Date Exacte</td><td>${formatPct(globalPctDate)}</td></tr>
                <tr><td>Évolution Globale / Jour Équivalent</td><td>${formatPct(globalPctJour)}</td></tr>
            `;
            document.querySelector('#recapGroupeTable tbody').innerHTML = htmlGroupe;

            // Préparation matrice export Groupe brute
            exportDataGroupe = [
                ["CA Journalier Global", totCA2026],
                ["Cumul Mensuel Global", totCumul2026],
                ["Variation Globale / Date Exacte (%)", globalPctDate],
                ["Variation Globale / Jour Équivalent (%)", globalPctJour]
            ];

            document.getElementById('dashboard').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    });

    // Fonction d'export structuré
    function exportToExcel() {
        const wb = XLSX.utils.book_new();

        // --- 1. Construction de la feuille Recap DG ---
        // On recrée l'en-tête de votre fichier d'origine
        const dgMatrix = [
            ["", "", "Tableau de bord du chiffre d'affaires journalier"],
            [],
            [],
            ["", "", "", dateDuJourStr],
            [],
            ["Site", "CA Journalier 2026", "Cumul Mensuel 2026", "Variation / Date exacte (%)", "Variation / Jour équivalent (%)"],
            ...exportDataDg
        ];
        const wsDg = XLSX.utils.aoa_to_sheet(dgMatrix);
        
        // --- 2. Construction de la feuille Recap Groupe ---
        const groupeMatrix = [
            ["", "Tableau de bord du chiffre d'affaires journalier"],
            [],
            [],
            ["", "", dateDuJourStr],
            [],
            ["Indicateur", "Valeur / Évolution"],
            ...exportDataGroupe
        ];
        const wsGroupe = XLSX.utils.aoa_to_sheet(groupeMatrix);

        // Ajout des feuilles au classeur
        XLSX.utils.book_append_sheet(wb, wsDg, "Recap DG");
        XLSX.utils.book_append_sheet(wb, wsGroupe, "Recap Groupe");

        // Téléchargement
        XLSX.writeFile(wb, "Tableau_de_Bord_Consolide.xlsx");
    }
</script>

</body>
</html>
